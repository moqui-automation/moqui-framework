# A Docker Swarm stack for an OpenSearch cluster.
#
# Create the overlay network (optional, stack deploy will create it):
#     docker network create --driver=overlay --attachable searchnet
#
# Apply labels to nodes:
#     docker node update --label-add search_node1=true node1
#     docker node update --label-add search_node2=true node2
#     docker node update --label-add search_node3=true node3
#     docker node update --label-add search_dashboards=true node1
#
# Deploy:
#     docker stack deploy -c opensearch-stack.yml moqui-search
#
# Remove the stack:
#     docker stack rm moqui-search
#     docker volume ls | grep moqui-search
#     docker volume rm moqui-search_search-data1 moqui-search_search-data2 moqui-search_search-data3
#
# Print logs:
#     docker service logs moqui-search_moqui-search1 --tail 200
#     docker service logs moqui-search_moqui-search2 --tail 200
#     docker service logs moqui-search_moqui-search3 --tail 200

networks:
  searchnet:
    driver: overlay
    attachable: true
  servernet: { external: true }

volumes:
  search-data1:
    driver: local
  search-data2:
    driver: local
  search-data3:
    driver: local

services:
  moqui-search1:
    image: opensearchproject/opensearch:2.4.0
    networks: [searchnet]
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms1024m -Xmx1024m
      - cluster.name=moqui-search
      - node.name=moqui-search1
      - node.roles=["master","data","ingest"]
      - discovery.seed_hosts=moqui-search1,moqui-search2,moqui-search3
      - cluster.initial_master_nodes=moqui-search1,moqui-search2,moqui-search3
      - network.host=_site_
      - bootstrap.memory_lock=true
      - plugins.security.disabled=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    volumes:
      - type: volume
        source: search-data1
        target: /usr/share/opensearch/data
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    deploy:
      replicas: 1
      update_config: { parallelism: 1, delay: 10s, failure_action: rollback }
      rollback_config: { parallelism: 1, delay: 5s, order: stop-first }
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      placement:
        constraints:
          - node.labels.search_node1 == true
      resources:
        limits: { memory: 2048M }
        reservations: { memory: 1024M }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  moqui-search2:
    image: opensearchproject/opensearch:2.4.0
    networks: [searchnet]
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms1024m -Xmx1024m
      - cluster.name=moqui-search
      - node.name=moqui-search2
      - node.roles=["master","data","ingest"]
      - discovery.seed_hosts=moqui-search1,moqui-search2,moqui-search3
      - cluster.initial_master_nodes=moqui-search1,moqui-search2,moqui-search3
      - network.host=_site_
      - bootstrap.memory_lock=true
      - plugins.security.disabled=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    volumes:
      - type: volume
        source: search-data2
        target: /usr/share/opensearch/data
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    deploy:
      replicas: 1
      update_config: { parallelism: 1, delay: 10s, failure_action: rollback }
      rollback_config: { parallelism: 1, delay: 5s, order: stop-first }
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      placement:
        constraints:
          - node.labels.search_node2 == true
      resources:
        limits: { memory: 2048M }
        reservations: { memory: 1024M }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  moqui-search3:
    image: opensearchproject/opensearch:2.4.0
    networks: [searchnet]
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms1024m -Xmx1024m
      - cluster.name=moqui-search
      - node.name=moqui-search3
      - node.roles=["master","data","ingest"]
      - discovery.seed_hosts=moqui-search1,moqui-search2,moqui-search3
      - cluster.initial_master_nodes=moqui-search1,moqui-search2,moqui-search3
      - network.host=_site_
      - bootstrap.memory_lock=true
      - plugins.security.disabled=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    volumes:
      - type: volume
        source: search-data3
        target: /usr/share/opensearch/data
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    deploy:
      replicas: 1
      update_config: { parallelism: 1, delay: 10s, failure_action: rollback }
      rollback_config: { parallelism: 1, delay: 5s, order: stop-first }
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      placement:
        constraints:
          - node.labels.search_node3 == true
      resources:
        limits: { memory: 2048M }
        reservations: { memory: 1024M }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.4.0
    networks: [searchnet, servernet]
    environment:
      OPENSEARCH_HOSTS: '["http://moqui-search1:9200","http://moqui-search2:9200","http://moqui-search3:9200"]'
      SERVER_BASEPATH: ""
      SERVER_REWRITEBASEPATH: "false"
    ports:
      - target: 5601
        published: 5601
        protocol: tcp
        mode: host
    deploy:
      replicas: 1
      update_config: { parallelism: 1, delay: 10s, failure_action: rollback }
      rollback_config: { parallelism: 1, delay: 5s, order: stop-first }
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      placement:
        constraints:
          - node.labels.search_dashboards == true
      resources:
        limits: { memory: 2048M }
        reservations: { memory: 512M }
