# A Docker Compose application for a Yugabyte cluster.

networks:
  dbnet:
    driver: bridge

volumes:
  db1: { driver: local }
  db2: { driver: local }
  db3: { driver: local }

services:
  # Yugabyte node 1
  moqui-database1:
    image: yugabytedb/yugabyte:latest
    hostname: moqui-database1
    container_name: moqui-database1
    networks: [dbnet]
    volumes:
      - db1:/mnt/disk0
      - ./yugabyte/yb-start.sh:/usr/local/bin/yb-start.sh:ro
    environment:
      YB_BASE_DIR: /mnt/disk0/yb-data
      YB_JOIN: "" # primo nodo: nessun join
    command: ["/usr/local/bin/yb-start.sh"]
    ports:
      - "7001:7000" # Master UI
      - "9001:9000" # TServer UI
      - "5433:5433" # YSQL
    ulimits:
      memlock: -1
      nofile:
        soft: 1048576
        hard: 1048576
      nproc: 12000
    restart: always

  # Yugabyte node 2
  moqui-database2:
    image: yugabytedb/yugabyte:latest
    hostname: moqui-database2
    container_name: moqui-database2
    networks: [dbnet]
    volumes:
      - db2:/mnt/disk0
      - ./yugabyte/yb-start.sh:/usr/local/bin/yb-start.sh:ro
    environment:
      YB_BASE_DIR: /mnt/disk0/yb-data
      YB_JOIN: moqui-database1
    command: ["/usr/local/bin/yb-start.sh"]
    ports:
      - "7002:7000"
      - "9002:9000"
    ulimits:
      memlock: -1
      nofile:
        soft: 1048576
        hard: 1048576
      nproc: 12000
    restart: always

  # Yugabyte node 3
  moqui-database3:
    image: yugabytedb/yugabyte:latest
    hostname: moqui-database3
    container_name: moqui-database3
    networks: [dbnet]
    volumes:
      - db3:/mnt/disk0
      - ./yugabyte/yb-start.sh:/usr/local/bin/yb-start.sh:ro
    environment:
      YB_BASE_DIR: /mnt/disk0/yb-data
      YB_JOIN: moqui-database1
    command: ["/usr/local/bin/yb-start.sh"]
    ports:
      - "7003:7000"
      - "9003:9000"
    ulimits:
      memlock: -1
      nofile:
        soft: 1048576
        hard: 1048576
      nproc: 12000
    restart: always

  # Bootstrap container (one-shot to create Moqui role/db/pgvector/...)
  moqui-database-bootstrap:
    image: yugabytedb/yugabyte:latest
    container_name: moqui-database-bootstrap
    networks: [dbnet]
    depends_on:
      - moqui-database1
      - moqui-database2
      - moqui-database3
    volumes:
      - ./yugabyte/bootstrap.sh:/bootstrap/bootstrap.sh:ro
      - ./yugabyte/bootstrap-run.sh:/usr/local/bin/bootstrap-run.sh:ro
    environment:
      YSQL_HOST: moqui-database1
      YSQL_PORT: "5433"
      YSQL_SUPERUSER: yugabyte
      YSQL_SUPERDB: yugabyte
      MOQUI_USER: moqui
      MOQUI_PASSWORD: moqui
      MOQUI_DB: moqui
    command: ["/usr/local/bin/bootstrap-run.sh"]
    restart: "no"
