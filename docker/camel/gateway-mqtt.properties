# =============================================================================
# gateway-mqtt.properties — production MQTT overrides for moqui-camel-gateway
#
# Loaded via Docker Swarm config mounted at /deployments/config/
# SmallRye Config picks up all *.properties files in that directory.
#
# Create the Docker config before deploying:
#   docker config create gateway_mqtt_config ./camel/gateway-mqtt.properties
#
# Keys here override the defaults in application.properties.
# Only set what differs from the defaults (SEDA endpoints).
# =============================================================================

# ---------------------------------------------------------------------------
# Inbound: Artemis MQTT v5 → JSON → INSERT PARAMETER_LOG
# ---------------------------------------------------------------------------
inbound.route.autoStartup=true
inbound.consume.uri=paho-mqtt5:iot/parameters/in?brokerUrl=tcp://moqui-broker:1883&clientId=camel-gateway-in&userName=artemis&password=artemis

# Call Moqui REST API after DB insert
inbound.afterDb.enabled=true
inbound.afterDb.uri=http://moqui-server:8080/rest/s1/camel/inbound-callback

# ---------------------------------------------------------------------------
# Outbound: SQL → JSON → Artemis MQTT v5
# ---------------------------------------------------------------------------
outbound.publish.uri=paho-mqtt5:iot/parameters/out?brokerUrl=tcp://moqui-broker:1883&clientId=camel-gateway-out&userName=artemis&password=artemis

# Update DeviceRequest timestamp after publish
outbound.afterPublish.enabled=true
outbound.afterPublish.uri=sql:UPDATE DEVICE_REQUEST SET LAST_UPDATED_STAMP = CURRENT_TIMESTAMP WHERE REQUEST_NAME = :#requestName

# ---------------------------------------------------------------------------
# Recipe export: SFTP to PLC / industrial device
# ---------------------------------------------------------------------------
recipe.filename=recipe.txt
file.transfer.uri=sftp:${sftp.user}@${sftp.host}:${sftp.port}${sftp.remote.dir}
sftp.host=plc.example.com
sftp.port=22
sftp.user=admin
sftp.remote.dir=/recipe
