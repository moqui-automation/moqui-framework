#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

stream {

    server {
        listen 5432 so_keepalive=on;
        proxy_pass backend;
    }


    # configure nginx as a database proxy
    upstream backend {
       server moqui-database-primary:5432 fail_timeout=15s;
       server moqui-database-secondary:5432 backup;
    }

